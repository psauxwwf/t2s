name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and publish release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y make binutils tar gzip unzip curl

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Build project
        run: task build VERSION=${{ github.ref_name }}

      - name: Pack release artifacts
        run: |
          tar -czf "./bin/${{ github.event.repository.name }}_linux_amd64.tar.gz" -C ./bin "${{ github.event.repository.name }}"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./bin/${{ github.event.repository.name }}_linux_amd64.tar.gz
